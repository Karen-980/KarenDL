name: Karen YouTube

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube Video URL'
        required: true

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yt-dlp

      - name: Create Cookies File
        env:
          YT_COOKIE: ${{ secrets.YT_COOKIE }}
        run: |
          echo "$YT_COOKIE" > cookies.txt

      - name: Download Video
        run: |
          yt-dlp --cookies cookies.txt -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" "${{ github.event.inputs.url }}" -o "video.mp4"

      - name: Upload Video
        uses: actions/upload-artifact@v4
        with:
          name: youtube-video
          path: video.mp4
          retention-days: 1

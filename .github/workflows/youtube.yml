name: Karen YouTube Pro
on:
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube Video URL'
        required: true
      resolution:
        description: 'Select Resolution'
        required: true
        default: 'best'
        type: choice
        options:
          - 'best'
          - '1080'
          - '720'
          - '480'

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Tools
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade yt-dlp

      - name: Create Cookie File
        run: echo "${{ secrets.YT_COOKIE }}" > cookies.txt

      - name: Download Video
        run: |
          if [ "${{ github.event.inputs.resolution }}" == "best" ]; then
            FORMAT="bestvideo+bestaudio/best"
          else
            FORMAT="bestvideo[height<=${{ github.event.inputs.resolution }}]+bestaudio/best[height<=${{ github.event.inputs.resolution }}]"
          fi
          
          yt-dlp --cookies cookies.txt \
                 -f "$FORMAT" \
                 --merge-output-format mp4 \
                 "${{ github.event.inputs.url }}" \
                 -o "video.mp4"

      - name: Upload Video Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Karen-Downloaded-Video
          path: video.mp4
          retention-days: 1
